{{define "change-password"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Labels.Title}}</title>
    {{template "fonts"}}
    <link rel="stylesheet" href="/assets/css/app/main.css?v={{.CacheVersion}}">
    <link rel="stylesheet" href="/assets/css/entydad/entydad-login02.css?v={{.CacheVersion}}">
    <link rel="stylesheet" href="/assets/css/entydad/entydad-reset-password02.css?v={{.CacheVersion}}">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main id="main-content">
    <div class="auth-page">
        <div class="auth-split">
            <!-- Form panel (full width — no carousel on the change-password page) -->
            <div class="auth-form-section">
                <div class="auth-form-container">

                    {{if .Success}}
                    <!-- ===== Success state ===== -->
                    <div class="reset02-success" data-testid="change-password-success">
                        <div class="reset02-success-icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                <polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>
                        </div>
                        <h1 class="auth-heading">{{.Labels.SuccessMessage}}</h1>
                        <a href="{{.BackURL}}" class="auth-button reset02-back-btn">{{.Labels.BackToApp}}</a>
                    </div>

                    {{else}}
                    <!-- ===== Form state ===== -->
                    <h1 class="auth-heading">{{.Labels.Heading}}</h1>
                    <p class="auth-subheading">{{.Labels.Subheading}}</p>

                    {{if .Error}}
                    <div class="reset02-error" role="alert" data-testid="change-password-error">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <span>{{.Error}}</span>
                    </div>
                    {{end}}

                    <form class="auth-form" method="POST" action="{{.PostURL}}" id="changePasswordForm">
                        <div class="auth-form-group">
                            <label class="auth-form-label" for="old_password">{{.Labels.OldPasswordLabel}}</label>
                            <input
                                type="password"
                                id="old_password"
                                name="old_password"
                                class="auth-form-input"
                                placeholder="{{.Labels.OldPasswordPlaceholder}}"
                                required
                                autocomplete="current-password"
                            >
                        </div>

                        <div class="auth-form-group">
                            <label class="auth-form-label" for="new_password">{{.Labels.NewPasswordLabel}}</label>
                            <input
                                type="password"
                                id="new_password"
                                name="new_password"
                                class="auth-form-input"
                                placeholder="{{.Labels.NewPasswordPlaceholder}}"
                                required
                                autocomplete="new-password"
                            >
                            <span class="auth-form-error" id="newPasswordError"></span>
                        </div>

                        <div class="auth-form-group">
                            <label class="auth-form-label" for="confirm_password">{{.Labels.ConfirmPasswordLabel}}</label>
                            <input
                                type="password"
                                id="confirm_password"
                                name="confirm_password"
                                class="auth-form-input"
                                placeholder="{{.Labels.ConfirmPasswordPlaceholder}}"
                                required
                                autocomplete="new-password"
                            >
                            <span class="auth-form-error" id="confirmPasswordError"></span>
                        </div>

                        <button type="submit" class="auth-button" data-testid="change-password-submit">{{.Labels.SubmitButton}}</button>
                    </form>

                    <div class="auth-form-footer">
                        <a href="{{.BackURL}}" class="auth-form-link">{{.Labels.BackToApp}}</a>
                    </div>
                    {{end}}

                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var form = document.getElementById('changePasswordForm');
            if (!form) return;
            form.addEventListener('submit', function(e) {
                var newPw = document.getElementById('new_password');
                var confirmPw = document.getElementById('confirm_password');
                var confirmErr = document.getElementById('confirmPasswordError');
                if (newPw && confirmPw && newPw.value !== confirmPw.value) {
                    e.preventDefault();
                    if (confirmErr) {
                        confirmErr.textContent = 'Passwords do not match';
                    }
                    confirmPw.focus();
                }
            });
        })();
    </script>
    </main>
</body>
</html>
{{end}}
