{{define "portal-client-home"}}
    {{template "portal-shell" .}}
{{end}}

{{define "portal-client-home-content"}}
<div data-testid="portal-client-home-heading" class="portal-page" data-page-title="{{.Title}}">
    <h1 class="portal-page-title">{{.Labels.Client.Home.Heading}}</h1>
    <p class="portal-page-subtitle">{{.Labels.Client.Home.Subheading}}</p>
    <div class="portal-card-grid" data-testid="portal-client-home-grid">
        {{range .Cards}}
        <a href="{{.URL}}" class="portal-nav-card" data-testid="portal-client-card-{{.Key}}">
            <span class="portal-nav-card-label">{{.Label}}</span>
        </a>
        {{end}}
    </div>
    <section class="portal-recent-activity" data-testid="portal-client-home-activity">
        <h2 class="portal-section-title">{{.Labels.Home.RecentActivityTitle}}</h2>
        <p class="portal-empty-hint">{{.Labels.Home.NoRecentActivity}}</p>
    </section>
</div>
{{end}}
